version: "2"
type: backend
tech_stack:
  - python
  - fastapi
  - postgresql
  - sqlalchemy
features:
  - name: Auth API
    description: Authentication operations
    files:
      - src/modules/identity_access/infrastructure/api/routes.py
    endpoints:
      - method: POST
        path: /api/v1/auth/login
        description: User login
        auth_required: false
        request_schema:
          body:
            username: string
            password: string
        response_schema:
          "200": Token
    depends_on: []
  - name: Users API
    description: User management
    files:
      - src/modules/identity_access/infrastructure/api/routes.py
    endpoints:
      - method: GET
        path: /api/v1/users/me
        description: Get current user
        auth_required: true
        response_schema:
          "200": User
    depends_on:
      - Auth API
known_limitations: []
