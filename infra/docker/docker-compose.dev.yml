version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: gamified_poo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gamified_poo
    ports:
      - "5435:5432"
    volumes:
      - gamified_poo_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gamified_poo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gamified_poo_redis
    ports:
      - "6379:6379"
    volumes:
      - gamified_poo_redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gamified_poo_pg_data:
  gamified_poo_redis_data:
