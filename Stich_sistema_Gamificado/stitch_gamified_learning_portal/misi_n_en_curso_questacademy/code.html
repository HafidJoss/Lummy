            0% { transform: translateY(0px); }

<!-- Interaction Script -->
<script>
        function selectOption(btn) {
            // Reset all options
            document.querySelectorAll('.option-btn').forEach(b => {
                b.classList.remove('border-primary-container', 'bg-primary-fixed', 'ring-4', 'ring-primary/10');
                b.classList.add('border-surface-dim', 'bg-surface-container');
            });
            
            // Highlight selected
            btn.classList.remove('border-surface-dim', 'bg-surface-container');
            btn.classList.add('border-primary-container', 'bg-primary-fixed', 'ring-4', 'ring-primary/10');
            
            // Add a little pop effect
            btn.classList.add('scale-[1.02]');
            setTimeout(() => btn.classList.remove('scale-[1.02]'), 100);
        }

        function confirmAnswer() {
            const selected = document.querySelector('.option-btn.bg-primary-fixed');
            if (!selected) {
                alert("Por favor, selecciona una opción para continuar.");
                return;
            }
            
            // Mock visual feedback for "Correct"
            const isCorrect = selected.innerText.includes('true'); // Simple logic for demo
            
            if (isCorrect) {
                selected.classList.remove('bg-primary-fixed', 'border-primary-container');
                selected.classList.add('bg-secondary-container', 'border-secondary');
                
                // Add success toast or transition logic here
                const btnContent = document.querySelector('button[onclick="confirmAnswer()"] span:first-child');
                btnContent.innerText = "¡Correcto! Siguiente";
                document.querySelector('button[onclick="confirmAnswer()"]').classList.remove('bg-primary-container', 'shadow-[#001e9b]');
                document.querySelector('button[onclick="confirmAnswer()"]').classList.add('bg-secondary', 'shadow-[#255100]');
            } else {
                selected.classList.remove('bg-primary-fixed', 'border-primary-container');
                selected.classList.add('bg-error-container', 'border-error');
            }
        }

        // Timer simulation
        let time = 292; // 4:52
        setInterval(() => {
            time--;
            const mins = Math.floor(time / 60);
            const secs = time % 60;
            document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    </script>
