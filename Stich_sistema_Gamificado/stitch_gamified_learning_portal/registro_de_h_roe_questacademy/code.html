<!-- Hidden Mobile Nav (Suppressed per logic for transactional screen) -->
<script>
        // Micro-interaction for input fields
        const inputs = document.querySelectorAll('.input-hero input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('border-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('border-primary');
            });
        });

        // Floating elements animation variability
        document.querySelectorAll('.floating-orb').forEach((orb, index) => {
            orb.style.animationDuration = (6 + index * 2) + 's';
        });
    </script>
